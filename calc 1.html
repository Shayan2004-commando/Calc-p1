<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Structure of a Calculator </title>
</head>
<body>
    <div id="container">
        <div id="calculator">
            <div id="keyboard">
                <button class="operator" id="clear">C</button>
                <button class="operator" id="backspace">←</button>
                <button class="operator" id="percent">%</button>
                <button class="operator" id="/">&#274;</button> 
                <button class="number" id="7">7</button>
                <button class="number" id="8">8</button>
                <button class="number" id="9">9</button>
                <button class="operator" id="*">*</button>
                <button class="number" id="4">4</button>
                <button class="number" id="5">5</button>
                <button class="number" id="6">6</button>
                <button class="operator" id="-">-</button>
                <button class="number" id="1">1</button>
                <button class="number" id="2">2</button>
                <button class="number" id="3">3</button>
                <button class="operator" id="+">+</button>
                <button class="number" id="0">0</button>
                <button class="number" id="decimal">.</button>
                <button class="operator" id="equals">=</button>

            </div>
        </div>
    </div>
    <div class="background">

<div class="calculator">

<input type="text" id="display" value="0" readonly>

<button>C</button>

<button>CE</button>

<button>%</button>

<button class="operator plus">+</button>

<button>7</button>

<button>8</button>

<button>9</button>

<button class="operator multiply">*</button>

<button>4</button>

<button>5</button>

<button>6</button>

<button class="operator minus">-</button>

<button>1</button>

<button>2</button>

<button>3</button>

<button class="operator divide">/</button>

<button class="zero">0</button>

<button>.</button>

<button class="operator equal">=</button>

</div>

</div>
</body>
</html>
